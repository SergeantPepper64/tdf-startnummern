<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDF Startnummern</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="title-card">
        <h1>TDF Startnummern</h1>
    </div>

      <input
        type="number"
        id="numberInput"
        placeholder="Startnummer eingeben"
        inputmode="numeric"
        pattern="[0-9]*"
        autofocus>

    //<h2 id="result">Bitte eine Nummer eingeben.</h2>
    <div id="result"></div>

    <script src="script.js"></script>

</body>
</html>
